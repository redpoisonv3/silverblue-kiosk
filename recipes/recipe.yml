name: silverblue-kiosk
description: Read-only automated Moonlight Kiosk terminal.
base-image: quay.io/fedora-ostree-desktops/silverblue:40

modules:
  - type: rpm-ostree
    install:
      - cage
      - flatpak
      - curl
      - mesa-dri-drivers
      - xrandr
      - newt

  - type: files

  - type: flatpak
    remotes:
      flathub: https://dl.flathub.org/repo/flathub.flatpakrepo
    install:
      - com.limelight_stream.Moonlight