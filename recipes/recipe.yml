# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: silverblue-kiosk
description: Read-only automated Moonlight Kiosk terminal.
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 40

modules:
  - type: rpm-ostree
    install:
      - cage
      - flatpak
      - curl
      - mesa-dri-drivers
      - xrandr
      - newt

  - type: default-flatpaks
    configurations:
      - scope: system
        notify: false
        install:
          - com.limelight_stream.Moonlight